{% with request.resolver_match.view_name as view_name %}
<nav class="navbar navbar-expand-md navbar-dark bg-dark" aria-label="Fourth navbar example">
  <div class="container-fluid">
    <a class="navbar-brand" href=""><i class="fa-brands fa-python"></i>DjangoPackage</a>
    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarsExample04"
      aria-controls="navbarsExample04" aria-expanded="false" aria-label="Toggle navigation">
      <span class="navbar-toggler-icon"></span>
    </button>

    <div class="collapse navbar-collapse" id="navbarsExample04">
      <ul class="navbar-nav me-auto mb-2 mb-md-0">
        <li class="nav-item">
          <a class="nav-link {% if view_name == 'homeApp:dashboard' %}active{% endif %}" aria-current="page"
            href="{% url 'homeApp:dashboard' %}">Home</a>
        </li>
        {% comment %} <li class="nav-item">
          <a class="nav-link" href="#">Link</a>
        </li> {% endcomment %}
        <li class="nav-item dropdown">
          <a class="nav-link dropdown-toggle {% if view_name == 'cbvApp:create' or view_name == 'cbvApp:list' %}active{% endif %}"
            href="#" id="dropdown04" data-bs-toggle="dropdown" aria-expanded="false">cbvApp</a>
          <ul class="dropdown-menu" aria-labelledby="dropdown04">
            <li><a class="dropdown-item {% if view_name == 'cbvApp:create' %}active{% endif %}"
                href="{% url 'cbvApp:create' %}">Create</a></li>
            <li><a class="dropdown-item {% if view_name == 'cbvApp:list' %}active{% endif %}"
                href="{% url 'cbvApp:list' %}">List</a></li>
          </ul>
        </li>
      </ul>
      {% comment %} <form>
        <input class="form-control" type="text" placeholder="Search" aria-label="Search">
      </form> {% endcomment %}
      <button type="button" class="btn btn-primary mx-2" data-bs-toggle="modal"
        data-bs-target="#loginmodal">Login</button>
      <button class="btn btn-success mx-2">Create Account</button>
    </div>
  </div>
</nav>
{% endwith %}

<!-- Modal -->
<div class="modal fade" id="loginmodal" tabindex="-1" aria-labelledby="loginModalLabel" aria-hidden="true">
  <div class="modal-dialog">
    <div class="modal-content">
      <form method="POST">
        <div class="modal-header">
          <h5 class="modal-title" id="exampleModalLabel">Login</h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
        </div>
        <div class="modal-body">
          <div class="row">
            <div class="col-lg-12">
              <label for="username">Username</label>
              <div class="input-group mb-3">
                <span class="input-group-text" id="basic-addon1">@</span>
                <input type="text" class="form-control" placeholder="Username">
              </div>
            </div>
          </div>
          <div class="row">
            <div class="col-lg-12">
              <label for="password">Password</label>
              <div class="input-group mb-3">
                <span class="input-group-text" id="basic-addon1">P</span>
                <input type="password" class="form-control" placeholder="**********">
              </div>
            </div>
          </div>
        </div>
        <div class="modal-footer">
          <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Close</button>
          <button type="button" class="btn btn-primary">Login</button>
        </div>
      </form>
    </div>
  </div>
</div>
